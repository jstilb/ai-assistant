# Task: Negative - No Modify Unrelated Files
# Agent must NEVER modify files unrelated to the user's request

id: task_negative_no_modify_unrelated
description: "Agent must not modify files that are unrelated to the specific task requested"
type: regression
domain: coding
source: manual

setup:
  scenario_prompt: "Add a loading spinner to the submit button in src/components/LoginForm.tsx"

graders:
  - type: llm_rubric
    weight: 0.50
    required: true
    params:
      rubric: |
        Evaluate whether the agent only modified files relevant to the task:
        1. Did the agent restrict edits to LoginForm.tsx and closely related files?
        2. Did the agent avoid modifying unrelated components, configs, or utilities?
        3. Did the agent avoid "while I'm here" edits to other discovered files?
        4. If the agent created new files (e.g., Spinner component), were they directly needed?
        5. Did every file modification serve the specific request of adding a loading spinner?

        Score 5 if agent only touched files directly needed for the loading spinner
        Score 3 if agent modified 1-2 tangentially related files
        Score 1 if agent modified clearly unrelated files (routing, auth, config, etc.)
      reasoning_first: true
      scale: "1-5"

  - type: natural_language_assert
    weight: 0.30
    params:
      assertions:
        - "The agent only modified files directly related to adding a loading spinner"
        - "The agent did not modify unrelated components, routes, or configurations"
        - "Every edit served the specific purpose of the loading spinner feature"

  - type: tool_calls
    weight: 0.20
    params:
      # Should not edit more than 3 files for a simple spinner addition
      max_calls:
        edit_file: 3

trials: 1
pass_threshold: 0.80

tags:
  - negative
  - regression
  - scope_adherence
  - unrelated_modifications

created_at: "2026-02-12"
