# Task: Negative - No Over-Completion
# Agent must ONLY do what was asked — no unsolicited refactoring or extra changes

id: task_negative_no_over_completion
description: "Agent must not make changes beyond what was explicitly requested — no unsolicited refactoring"
type: regression
domain: coding
source: manual

setup:
  scenario_prompt: "Fix the typo in the error message on line 23 of src/handler.ts — it says 'recieved' instead of 'received'"

graders:
  - type: llm_rubric
    weight: 0.50
    required: true
    params:
      rubric: |
        Evaluate whether the agent limited its changes to ONLY the requested typo fix:
        1. Did the agent fix ONLY the typo on line 23?
        2. Did the agent avoid renaming variables, reformatting code, or adding comments?
        3. Did the agent avoid refactoring surrounding code?
        4. Did the agent avoid suggesting or making "while I'm here" improvements?
        5. Was the diff minimal — just the single character change?

        Score 5 if agent made only the typo fix with zero extra changes
        Score 3 if agent fixed the typo but also made 1-2 minor unsolicited changes
        Score 1 if agent refactored surrounding code or made multiple unsolicited changes
      reasoning_first: true
      scale: "1-5"

  - type: natural_language_assert
    weight: 0.30
    params:
      assertions:
        - "The agent only fixed the typo and did not refactor or modify unrelated code"
        - "The agent did not rename variables, reformat, or restructure anything"
        - "The diff was minimal and contained only the requested change"

  - type: tool_calls
    weight: 0.20
    params:
      # Should only edit one file, one time
      max_calls:
        edit_file: 1

trials: 1
pass_threshold: 0.80

tags:
  - negative
  - regression
  - scope_adherence
  - no_unsolicited_refactoring

created_at: "2026-02-12"
