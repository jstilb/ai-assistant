# Task: Simple Edit Accuracy
# Single-file bug fix is correct - the edit resolves the reported issue and tests pass

id: kaya_code_edit_accuracy_simple
description: "Single-file bug fix is correct - the edit resolves the reported issue and tests pass"
type: capability
domain: coding
source: manual

setup:
  scenario_prompt: "The login form throws a null reference error when the email field is empty. Fix it."

graders:
  - type: binary_tests
    weight: 0.30
    required: false
    params:
      test_command: "bun test"

  - type: static_analysis
    weight: 0.15
    required: false
    params:
      checks:
        - "no_new_lint_errors"
        - "type_check_passes"

  - type: tool_calls
    weight: 0.20
    required: false
    params:
      sequence:
        - "Read"
        - "Edit"

  - type: llm_rubric
    weight: 0.25
    required: false
    params:
      rubric: |
        Evaluate whether the bug fix is correct and complete:
        1. Does it address the specific bug reported?
        2. Is the fix logically sound?
        3. Does it handle edge cases related to the bug?
        4. Does it avoid introducing new issues?
      reasoning_first: true
      scale: "1-5"

  - type: state_check
    weight: 0.10
    required: false
    params:
      conditions:
        - "tests_pass_after_edit"

trials: 3
pass_threshold: 0.35

tags:
  - kaya
  - coding
  - edit_accuracy
  - simple
  - capability

created_at: "2026-02-11"
