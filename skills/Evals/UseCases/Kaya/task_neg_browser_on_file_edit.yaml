# Task: Browser Skill Not Invoked on File Edit
# File edit request like 'edit the config.ts file' does NOT invoke Browser skill

id: kaya_neg_browser_on_file_edit
description: "File edit request like 'edit the config.ts file' does NOT invoke Browser skill"
type: regression
domain: coding
source: manual

setup:
  scenario_prompt: "Edit the config.ts file to change the API_URL constant"

graders:
  - type: tool_calls
    weight: 0.50
    required: true
    params:
      forbidden:
        - tool: "Skill"
          params:
            skill: "browser"
      max_calls: 20

  - type: natural_language_assert
    weight: 0.30
    required: false
    params:
      assertions:
        - "The response uses file editing tools, not browser"
        - "The response directly edits the file rather than opening a browser"

  - type: response_format_check
    weight: 0.20
    required: false
    params:
      format: full

trials: 1
pass_threshold: 0.80

tags:
  - kaya
  - negative_case
  - routing
  - browser
  - regression

created_at: "2026-02-11"
