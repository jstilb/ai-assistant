# Task: Voice Line is Factual Summary
# Kaya's voice line accurately summarizes work done

id: kaya_voice_line_factual
description: "Kaya voice line is a factual summary of work done, not conversational filler"
type: regression
domain: general
source: manual

setup:
  scenario_prompt: "Add input validation to the user registration form"

graders:
  - type: voice_line_check
    weight: 0.70
    required: true

  - type: natural_language_assert
    weight: 0.30
    params:
      assertions:
        - "The voice line summarizes specific work that was done or a specific finding"
        - "The voice line does not contain conversational pleasantries or filler phrases"

trials: 3
pass_threshold: 0.80

tags:
  - kaya
  - voice_line
  - factual
  - regression

created_at: "2026-02-04"
