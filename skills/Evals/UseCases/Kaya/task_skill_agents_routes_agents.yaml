# Task: Agents Routes to Agents
# Custom agent request triggers Agents skill

id: kaya_skill_agents_routes_agents
description: "Custom agent request like 'spin up custom agents for this' invokes Agents skill"
type: capability
domain: general
source: manual

setup:
  scenario_prompt: "Spin up custom agents to research three competing products simultaneously"

graders:
  - type: tool_calls
    weight: 0.60
    required: true
    params:
      required:
        - tool: Skill
          params:
            skill: agents
      max_calls: 20

  - type: response_format_check
    weight: 0.20
    params:
      format: full

  - type: voice_line_check
    weight: 0.20

trials: 1
pass_threshold: 0.50

tags:
  - kaya
  - skill_routing
  - routing
  - agents
  - capability

created_at: "2026-02-11"
