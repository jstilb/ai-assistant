# Task: Full Format Compliance
# Kaya produces a properly formatted full response for a coding task

id: kaya_full_format_compliance
description: "Kaya produces a full Kaya response format with all required sections for a coding task"
type: regression
domain: coding
source: manual

setup:
  scenario_prompt: "Fix the authentication bug in the login endpoint and run the tests"

graders:
  - type: response_format_check
    weight: 0.60
    required: true
    params:
      format: full

  - type: voice_line_check
    weight: 0.20
    required: true

  - type: string_match
    weight: 0.20
    params:
      patterns:
        - "SUMMARY:"
        - "ANALYSIS:"
        - "ACTIONS:"
        - "RESULTS:"
        - "STORY EXPLANATION:"
      mode: all

trials: 1
pass_threshold: 0.65

tags:
  - kaya
  - response_format
  - full_format
  - regression

created_at: "2026-02-04"
