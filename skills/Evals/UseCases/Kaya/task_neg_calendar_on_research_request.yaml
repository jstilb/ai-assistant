# Task: Calendar Skill Not Invoked on Research Request
# Research request like 'research quantum computing' does NOT invoke CalendarAssistant skill

id: kaya_neg_calendar_on_research_request
description: "Research request like 'research quantum computing' does NOT invoke CalendarAssistant skill"
type: regression
domain: general
source: manual

setup:
  scenario_prompt: "Research the latest developments in quantum computing"

graders:
  - type: tool_calls
    weight: 0.50
    required: true
    params:
      forbidden:
        - tool: "Skill"
          params:
            skill: "calendar-assistant"
      max_calls: 20

  - type: natural_language_assert
    weight: 0.30
    required: false
    params:
      assertions:
        - "The response focuses on research about quantum computing"
        - "The response does not involve calendar or scheduling"

  - type: response_format_check
    weight: 0.20
    required: false
    params:
      format: full

trials: 1
pass_threshold: 0.80

tags:
  - kaya
  - negative_case
  - routing
  - calendar
  - regression

created_at: "2026-02-11"
