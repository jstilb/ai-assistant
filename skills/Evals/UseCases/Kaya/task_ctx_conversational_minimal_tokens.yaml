# Task: Conversational Minimal Tokens
# Short conversational input uses minimal tokens and keyword-stage classification

id: kaya_ctx_conversational_minimal_tokens
description: "Short conversational input like 'thanks!' uses minimal tokens (<=200) with keyword-stage classification"
type: regression
domain: conversational
source: manual

setup:
  scenario_prompt: "hey"

graders:
  - type: context_efficiency_check
    weight: 1.0
    required: true
    params:
      expected_profiles:
        - conversational
        - boot
      max_tokens: 200
      max_classification_stage: keyword

trials: 1
pass_threshold: 0.50

tags:
  - kaya
  - context_efficiency
  - token_budget
  - conversational
  - regression

created_at: "2026-02-11"
