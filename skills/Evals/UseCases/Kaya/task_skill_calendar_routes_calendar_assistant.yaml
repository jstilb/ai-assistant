# Task: Calendar Routes to CalendarAssistant
# Scheduling request invokes CalendarAssistant skill

id: kaya_skill_calendar_routes_calendar_assistant
description: "Scheduling request like 'schedule a meeting' invokes the CalendarAssistant skill"
type: capability
domain: general
source: manual

setup:
  scenario_prompt: "Schedule a meeting with Sarah tomorrow at 2pm"

graders:
  - type: tool_calls
    weight: 0.60
    required: true
    params:
      required:
        - tool: Skill
          params:
            skill: calendar-assistant

  - type: response_format_check
    weight: 0.20
    params:
      format: full

  - type: voice_line_check
    weight: 0.20

trials: 1
pass_threshold: 0.50

tags:
  - kaya
  - skill_quality
  - routing
  - calendar
  - capability

created_at: "2026-02-11"
