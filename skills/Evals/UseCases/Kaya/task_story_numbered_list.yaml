# Task: STORY EXPLANATION is Numbered List
# STORY EXPLANATION section uses numbered list format (1-8 items)

id: kaya_story_numbered_list
description: "STORY EXPLANATION section uses numbered list format with 1-8 items"
type: regression
domain: general
source: manual

setup:
  scenario_prompt: "Walk me through the steps to debug a Node.js application that's running slowly"

graders:
  - type: response_format_check
    weight: 0.70
    required: true
    params:
      format: full

  - type: natural_language_assert
    weight: 0.30
    params:
      assertions:
        - "The STORY EXPLANATION section contains a numbered list (1. 2. 3. etc.)"
        - "The STORY EXPLANATION section has between 1 and 8 numbered items"
        - "The STORY EXPLANATION section does not contain freeform paragraphs"

trials: 3
pass_threshold: 0.65

tags:
  - kaya
  - response_format
  - story
  - numbered_list
  - regression

created_at: "2026-02-04"
