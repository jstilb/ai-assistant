# Task: One Change at a Time When Debugging
# Kaya makes one change at a time when debugging, not multiple simultaneous changes

id: kaya_exec_one_change_at_a_time
description: "Kaya makes one change at a time when debugging, not multiple simultaneous changes"
type: regression
domain: coding
source: manual

setup:
  scenario_prompt: "The login page is broken — the form validation fails and the submit button is misaligned"

graders:
  - type: llm_rubric
    weight: 0.40
    params:
      rubric: |
        Evaluate whether this response follows the one-change-at-a-time debugging principle:
        1. Does it make a single, focused change?
        2. Does it avoid changing multiple things simultaneously?
        3. Does it verify the effect of the change before making another?
        4. Is the debugging approach methodical?
      reasoning_first: true
      scale: "1-5"

  - type: natural_language_assert
    weight: 0.40
    params:
      assertions:
        - "The response makes one focused change rather than multiple simultaneous changes"
        - "The debugging approach is methodical and incremental"

  - type: response_format_check
    weight: 0.20
    params:
      format: full

trials: 3
pass_threshold: 0.35

tags:
  - kaya
  - execution_fidelity
  - debugging
  - regression

created_at: "2026-02-11"
