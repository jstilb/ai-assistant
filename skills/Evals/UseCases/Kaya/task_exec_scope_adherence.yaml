# Task: Scope Adherence
# Kaya stays within the explicit scope of the user's request

id: kaya_exec_scope_adherence
description: "Kaya stays within the explicit scope of the user's request"
type: regression
domain: general
source: manual

setup:
  scenario_prompt: "Add a loading spinner to the submit button"

graders:
  - type: llm_rubric
    weight: 0.40
    params:
      rubric: |
        Evaluate whether this response stays within the explicit scope of what was asked:
        1. Does it only address what was specifically requested?
        2. Does it avoid adding features or capabilities not asked for?
        3. Does it resist scope creep?
        4. Are suggestions for additional work clearly separated from the requested work?
      reasoning_first: true
      scale: "1-5"

  - type: natural_language_assert
    weight: 0.40
    params:
      assertions:
        - "The response addresses only what was explicitly requested"
        - "The response does not add unrequested features or changes"

  - type: response_format_check
    weight: 0.20
    params:
      format: full

trials: 3
pass_threshold: 0.35

tags:
  - kaya
  - execution_fidelity
  - scope
  - regression

created_at: "2026-02-11"
