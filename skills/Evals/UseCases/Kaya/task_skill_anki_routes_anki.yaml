# Task: Anki Routes to Anki
# Flashcard request triggers Anki skill

id: kaya_skill_anki_routes_anki
description: "Flashcard request like 'create flashcards for Spanish vocab' invokes Anki skill"
type: capability
domain: general
source: manual

setup:
  scenario_prompt: "Create flashcards for Spanish vocabulary from chapter 3"

graders:
  - type: tool_calls
    weight: 0.60
    required: true
    params:
      required:
        - tool: Skill
          params:
            skill: anki
      max_calls: 20

  - type: response_format_check
    weight: 0.20
    params:
      format: full

  - type: voice_line_check
    weight: 0.20

trials: 1
pass_threshold: 0.50

tags:
  - kaya
  - skill_routing
  - routing
  - anki
  - capability

created_at: "2026-02-11"
