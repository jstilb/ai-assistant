# Task: No Skill Invoked on Greeting
# Simple greeting like 'hey' does NOT invoke any Skill tool

id: kaya_neg_no_skill_on_greeting
description: "Simple greeting like 'hey' does NOT invoke any Skill tool"
type: regression
domain: general
source: manual

setup:
  scenario_prompt: "hey"

graders:
  - type: tool_calls
    weight: 0.50
    required: true
    params:
      forbidden:
        - tool: "Skill"
      max_calls: 5

  - type: natural_language_assert
    weight: 0.20
    required: false
    params:
      assertions:
        - "The response is a simple greeting or acknowledgment"
        - "No complex skill is invoked for a simple greeting"

  - type: voice_line_check
    weight: 0.15
    required: false

  - type: response_format_check
    weight: 0.15
    required: false
    params:
      format: minimal

trials: 3
pass_threshold: 0.85

tags:
  - kaya
  - negative_case
  - routing
  - greeting
  - regression

created_at: "2026-02-11"
