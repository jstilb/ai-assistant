# Task: Dependency Ordering
# Task dependencies correctly identified - e.g., database before API, schema before migration

id: kaya_plan_dependency_ordering
description: "Task dependencies correctly identified - e.g., database before API, schema before migration"
type: capability
domain: coding
source: manual

setup:
  scenario_prompt: "Build a REST API with user auth, database, and email notifications"

graders:
  - type: llm_rubric
    weight: 0.50
    required: false
    params:
      rubric: |
        Evaluate dependency ordering:
        1. Are task dependencies correctly identified?
        2. Is the execution order valid (no circular deps)?
        3. Are prerequisites completed before dependent tasks?
        4. Are parallelizable tasks identified?
        5. Would following this order actually work?
      reasoning_first: true
      scale: "1-5"

  - type: natural_language_assert
    weight: 0.30
    required: false
    params:
      assertions:
        - "Task dependencies are correctly identified and ordered"
        - "Prerequisites are scheduled before dependent tasks"

  - type: response_format_check
    weight: 0.20
    required: false
    params:
      format: full

trials: 3
pass_threshold: 0.35

tags:
  - kaya
  - planning
  - dependencies
  - ordering
  - capability

created_at: "2026-02-11"
