# Task: Type Safety Preservation
# Kaya preserves TypeScript type safety - no `any` escape hatches or type assertions without justification

id: kaya_code_type_safety_preservation
description: "Kaya preserves TypeScript type safety - no `any` escape hatches or type assertions without justification"
type: capability
domain: coding
source: manual

setup:
  scenario_prompt: "Write a function that validates email addresses and returns typed results"

graders:
  - type: static_analysis
    weight: 0.35
    required: false
    params:
      checks:
        - "type_check_passes"
        - "no_new_any_types"

  - type: llm_rubric
    weight: 0.35
    required: false
    params:
      rubric: |
        Evaluate type safety of changes:
        1. Are TypeScript types preserved or improved?
        2. Are there any new `any` types introduced?
        3. Are type assertions justified and documented?
        4. Are generic types used appropriately?
        5. Do function signatures have proper return types?
      reasoning_first: true
      scale: "1-5"

  - type: natural_language_assert
    weight: 0.15
    required: false
    params:
      assertions:
        - "The response preserves or improves TypeScript type safety"
        - "No unjustified any types or type assertions are introduced"

  - type: response_format_check
    weight: 0.15
    required: false
    params:
      format: full

trials: 3
pass_threshold: 0.35

tags:
  - kaya
  - coding
  - type_safety
  - typescript
  - capability

created_at: "2026-02-11"
