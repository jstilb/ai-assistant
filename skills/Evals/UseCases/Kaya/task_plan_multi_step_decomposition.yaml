# Task: Multi-Step Decomposition
# Complex request is decomposed into ordered, actionable steps

id: kaya_plan_multi_step_decomposition
description: "Complex request is decomposed into ordered, actionable steps"
type: capability
domain: general
source: manual

setup:
  scenario_prompt: "Migrate the monolithic app to microservices"

graders:
  - type: llm_rubric
    weight: 0.50
    required: false
    params:
      rubric: |
        Evaluate the quality of task decomposition:
        1. Is the complex request broken into clear, actionable steps?
        2. Are steps properly ordered (dependencies respected)?
        3. Is each step specific enough to be actionable?
        4. Is the decomposition neither too granular nor too coarse?
        5. Are success criteria identified for each step?
      reasoning_first: true
      scale: "1-5"

  - type: natural_language_assert
    weight: 0.30
    required: false
    params:
      assertions:
        - "The response breaks the complex request into multiple ordered steps"
        - "Each step is specific and actionable"

  - type: response_format_check
    weight: 0.20
    required: false
    params:
      format: full

trials: 3
pass_threshold: 0.35

tags:
  - kaya
  - planning
  - decomposition
  - capability

created_at: "2026-02-11"
