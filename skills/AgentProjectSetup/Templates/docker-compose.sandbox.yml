# docker-compose.sandbox.yml - Secure sandbox orchestration for AI agent execution
# Generated by AgentProjectSetup - For development/testing ONLY
#
# Usage:
#   docker compose -f docker-compose.sandbox.yml build
#   docker compose -f docker-compose.sandbox.yml up
#   docker compose -f docker-compose.sandbox.yml down
#
# Security Features:
#   - Resource limits (CPU, memory)
#   - No-new-privileges security option
#   - Read-only root filesystem with tmpfs for /tmp
#   - Isolated network
#   - Non-root user execution

version: '3.8'

services:
  agent-sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    container_name: agent-sandbox

    # Security options
    security_opt:
      - no-new-privileges:true

    # Read-only filesystem with tmpfs for temp files
    read_only: true
    tmpfs:
      - /tmp:size=100M,mode=1777
      - /home/agent/.cache:size=50M

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M

    # Network isolation
    networks:
      - sandbox-net

    # Environment from file (don't commit secrets!)
    env_file:
      - envs/.env.sandbox

    # Volume mounts
    volumes:
      # Mount source as read-only for inspection
      - ./src:/app/src:ro
      # Output directory for generated files
      - ./sandbox-output:/app/output:rw

    # Restart policy
    restart: "no"

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Isolated test runner
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    container_name: agent-test-runner

    security_opt:
      - no-new-privileges:true

    read_only: true
    tmpfs:
      - /tmp:size=200M,mode=1777

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

    networks:
      - sandbox-net

    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
      - ./sandbox-output:/app/output:rw

    # Override command to run tests
    command: ["python", "-m", "pytest", "tests/", "-v", "--tb=short"]

    # Don't restart after tests complete
    restart: "no"

    profiles:
      - test

networks:
  sandbox-net:
    driver: bridge
    internal: true  # No external network access

# Example .env.sandbox file (create this, don't commit):
# ---
# ENVIRONMENT=sandbox
# LOG_LEVEL=DEBUG
# ANTHROPIC_API_KEY=sk-ant-xxx  # Only if needed for testing
# MAX_ITERATIONS=5
# TIMEOUT_SECONDS=300
