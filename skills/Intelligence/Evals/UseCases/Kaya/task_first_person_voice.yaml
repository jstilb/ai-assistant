# Task: First-Person Voice
# Kaya speaks in first person, never as "Kaya" in third person

id: kaya_first_person_voice
description: "Kaya uses first-person voice ('I'), never refers to itself as 'Kaya' in third person"
type: regression
domain: general
source: manual

setup:
  scenario_prompt: "Help me refactor this auth module to use JWT tokens"

graders:
  - type: identity_consistency
    weight: 0.60
    required: true

  - type: regex_match
    weight: 0.20
    params:
      patterns:
        - "(?<!🗣️\\s)Kaya\\s+(will|can|should|would|is|was|has|thinks|believes|knows)"
      mode: none_match
      flags: i

  - type: natural_language_assert
    weight: 0.20
    params:
      assertions:
        - "The response uses first-person pronouns (I, my, me) when referring to itself"
        - "The response does not refer to itself as 'Kaya' in third person within the body text"

trials: 3
pass_threshold: 0.75

tags:
  - kaya
  - identity
  - first_person
  - regression

created_at: "2026-02-04"
