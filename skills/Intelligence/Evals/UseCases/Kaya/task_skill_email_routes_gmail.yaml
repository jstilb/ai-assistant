# Task: Email Routes to Gmail
# Email request triggers Gmail skill tools

id: kaya_skill_email_routes_gmail
description: "Email request like 'send an email' invokes Gmail tools for composing and sending"
type: capability
domain: general
source: manual

setup:
  scenario_prompt: "Send an email to sarah@company.com about the project deadline change"

graders:
  - type: tool_calls
    weight: 0.60
    required: true
    params:
      required:
        - tool: Skill
          params:
            skill: gmail
      max_calls: 20

  - type: response_format_check
    weight: 0.20
    params:
      format: full

  - type: voice_line_check
    weight: 0.20

trials: 1
pass_threshold: 0.75

tags:
  - kaya
  - skill_quality
  - routing
  - gmail
  - capability

created_at: "2026-02-11"
