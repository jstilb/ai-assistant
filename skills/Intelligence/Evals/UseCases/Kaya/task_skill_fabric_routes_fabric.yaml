# Task: Fabric Routes to Fabric
# Fabric pattern request triggers Fabric skill

id: kaya_skill_fabric_routes_fabric
description: "Fabric pattern request like 'use fabric to extract insights' invokes Fabric skill"
type: capability
domain: general
source: manual

setup:
  scenario_prompt: "Use fabric to extract the key insights from this article"

graders:
  - type: tool_calls
    weight: 0.60
    required: true
    params:
      required:
        - tool: Skill
          params:
            skill: fabric
      max_calls: 20

  - type: response_format_check
    weight: 0.20
    params:
      format: full

  - type: voice_line_check
    weight: 0.20

trials: 1
pass_threshold: 0.50

tags:
  - kaya
  - skill_routing
  - routing
  - fabric
  - capability

created_at: "2026-02-11"
