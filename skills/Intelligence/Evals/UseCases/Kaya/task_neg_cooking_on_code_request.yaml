# Task: Cooking Skill Not Invoked on Code Request
# Coding request like 'fix this TypeScript error' does NOT invoke Cooking skill

id: kaya_neg_cooking_on_code_request
description: "Coding request like 'fix this TypeScript error' does NOT invoke Cooking skill"
type: regression
domain: coding
source: manual

setup:
  scenario_prompt: "Fix this TypeScript error: Property 'map' does not exist on type 'string'"

graders:
  - type: tool_calls
    weight: 0.50
    required: true
    params:
      forbidden:
        - tool: "Skill"
          params:
            skill: "cooking"
      max_calls: 20

  - type: natural_language_assert
    weight: 0.30
    required: false
    params:
      assertions:
        - "The response addresses the TypeScript error directly"
        - "The response does not involve cooking or recipes"

  - type: response_format_check
    weight: 0.20
    required: false
    params:
      format: full

trials: 1
pass_threshold: 0.80

tags:
  - kaya
  - negative_case
  - routing
  - cooking
  - regression

created_at: "2026-02-11"
