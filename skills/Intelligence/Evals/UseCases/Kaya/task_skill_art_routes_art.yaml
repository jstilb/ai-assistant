# Task: Art Routes to Art
# Art generation request triggers Art skill

id: kaya_skill_art_routes_art
description: "Art generation request like 'generate art for the blog header' invokes Art skill"
type: capability
domain: general
source: manual

setup:
  scenario_prompt: "Generate a header image for my blog post about AI agents"

graders:
  - type: tool_calls
    weight: 0.60
    required: true
    params:
      required:
        - tool: Skill
          params:
            skill: art
      max_calls: 20

  - type: response_format_check
    weight: 0.20
    params:
      format: full

  - type: voice_line_check
    weight: 0.20

trials: 1
pass_threshold: 0.50

tags:
  - kaya
  - skill_routing
  - routing
  - art
  - capability

created_at: "2026-02-11"
