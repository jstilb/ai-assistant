# Task: Tasks Routes to LucidTasks
# Task management request invokes LucidTasks skill

id: kaya_skill_tasks_routes_lucid_tasks
description: "Task request like 'add a task' invokes the LucidTasks skill tools"
type: capability
domain: general
source: manual

setup:
  scenario_prompt: "Add a task to fix the login page bug"

graders:
  - type: tool_calls
    weight: 0.60
    required: true
    params:
      required:
        - tool: Skill
          params:
            skill: lucid-tasks

  - type: response_format_check
    weight: 0.20
    params:
      format: full

  - type: voice_line_check
    weight: 0.20

trials: 1
pass_threshold: 0.50

tags:
  - kaya
  - skill_quality
  - routing
  - tasks
  - capability

created_at: "2026-02-11"
