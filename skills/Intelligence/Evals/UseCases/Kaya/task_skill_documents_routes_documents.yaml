# Task: Documents Routes to Documents
# Document processing request triggers Documents skill

id: kaya_skill_documents_routes_documents
description: "Document processing request like 'process this PDF and extract key info' invokes Documents skill"
type: capability
domain: general
source: manual

setup:
  scenario_prompt: "Process this PDF and extract the key findings"

graders:
  - type: tool_calls
    weight: 0.60
    required: true
    params:
      required:
        - tool: Skill
          params:
            skill: documents
      max_calls: 20

  - type: response_format_check
    weight: 0.20
    params:
      format: full

  - type: voice_line_check
    weight: 0.20

trials: 1
pass_threshold: 0.50

tags:
  - kaya
  - skill_routing
  - routing
  - documents
  - capability

created_at: "2026-02-11"
