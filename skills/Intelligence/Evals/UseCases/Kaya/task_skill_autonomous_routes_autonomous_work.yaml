# Task: Autonomous Work Routes to AutonomousWork
# Autonomous work request triggers AutonomousWork skill

id: kaya_skill_autonomous_routes_autonomous_work
description: "Autonomous work request like 'work start, pick up next queue task' invokes AutonomousWork skill"
type: capability
domain: general
source: manual

setup:
  scenario_prompt: "Start working on the next item in my queue"

graders:
  - type: tool_calls
    weight: 0.60
    required: true
    params:
      required:
        - tool: Skill
          params:
            skill: work
      max_calls: 20

  - type: response_format_check
    weight: 0.20
    params:
      format: full

  - type: voice_line_check
    weight: 0.20

trials: 1
pass_threshold: 0.50

tags:
  - kaya
  - skill_routing
  - routing
  - autonomous_work
  - capability

created_at: "2026-02-11"
