# Task: Verify Visual Changes with Browser
# Kaya uses browser/screenshot to verify visual changes rather than just claiming success

id: kaya_exec_verify_visual_changes
description: "Kaya uses browser/screenshot to verify visual changes rather than just claiming success"
type: regression
domain: coding
source: manual

setup:
  scenario_prompt: "Change the primary button color to blue and increase the font size"

graders:
  - type: tool_calls
    weight: 0.40
    required: true
    params:
      required:
        - tool: Skill
          params:
            skill: browser

  - type: natural_language_assert
    weight: 0.40
    params:
      assertions:
        - "The response includes visual verification of changes"
        - "The response uses screenshot or browser to confirm visual output"

  - type: response_format_check
    weight: 0.20
    params:
      format: full

trials: 3
pass_threshold: 0.35

tags:
  - kaya
  - execution_fidelity
  - verification
  - visual
  - regression

created_at: "2026-02-11"
