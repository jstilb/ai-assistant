# Task: Error Recovery
# Kaya recovers from a failed first attempt by reading error output and adjusting approach

id: kaya_code_error_recovery
description: "Kaya recovers from a failed first attempt by reading error output and adjusting approach"
type: capability
domain: coding
source: manual

setup:
  scenario_prompt: "Run the test suite and fix any failures"

graders:
  - type: llm_rubric
    weight: 0.40
    required: false
    params:
      rubric: |
        Evaluate error recovery behavior:
        1. Does Kaya read and interpret error messages?
        2. Does it adjust its approach based on the error?
        3. Does it avoid repeating the same failed approach?
        4. Does it demonstrate understanding of why the first attempt failed?
        5. Is the recovery methodical rather than random?
      reasoning_first: true
      scale: "1-5"

  - type: natural_language_assert
    weight: 0.30
    required: false
    params:
      assertions:
        - "The response shows reading and interpreting error output"
        - "The approach is adjusted based on the error rather than retrying the same thing"

  - type: tool_calls
    weight: 0.30
    required: false
    params:
      required:
        - tool: "Read"

trials: 3
pass_threshold: 0.35

tags:
  - kaya
  - coding
  - error_recovery
  - capability

created_at: "2026-02-11"
