# Task: CreateSkill Routes to CreateSkill
# Skill creation request triggers CreateSkill skill

id: kaya_skill_createskill_routes_createskill
description: "Skill creation request like 'create a new skill for weather tracking' invokes CreateSkill skill"
type: capability
domain: general
source: manual

setup:
  scenario_prompt: "Create a new skill for tracking my workouts"

graders:
  - type: tool_calls
    weight: 0.60
    required: true
    params:
      required:
        - tool: Skill
          params:
            skill: createskill
      max_calls: 20

  - type: response_format_check
    weight: 0.20
    params:
      format: full

  - type: voice_line_check
    weight: 0.20

trials: 1
pass_threshold: 0.50

tags:
  - kaya
  - skill_routing
  - routing
  - createskill
  - capability

created_at: "2026-02-11"
