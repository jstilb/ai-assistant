# Task: No Skill Invoked on Simple Question
# Simple question like 'what is 2+2' does NOT invoke any Skill tool

id: kaya_neg_no_skill_on_simple_question
description: "Simple question like 'what is 2+2' does NOT invoke any Skill tool"
type: regression
domain: general
source: manual

setup:
  scenario_prompt: "What is the capital of France?"

graders:
  - type: tool_calls
    weight: 0.50
    required: true
    params:
      forbidden:
        - tool: "Skill"
      max_calls: 5

  - type: natural_language_assert
    weight: 0.20
    required: false
    params:
      assertions:
        - "The response answers the simple question directly"
        - "No skill is invoked for a trivial question"

  - type: voice_line_check
    weight: 0.15
    required: false

  - type: response_format_check
    weight: 0.15
    required: false
    params:
      format: minimal

trials: 3
pass_threshold: 0.85

tags:
  - kaya
  - negative_case
  - routing
  - simple_question
  - regression

created_at: "2026-02-11"
