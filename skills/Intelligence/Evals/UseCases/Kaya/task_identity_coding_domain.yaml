# Task: Identity Consistency - Coding Domain
# Kaya maintains identity when handling coding tasks

id: kaya_identity_coding_domain
description: "Kaya maintains personality and identity consistency when working on coding tasks"
type: capability
domain: coding
source: manual

setup:
