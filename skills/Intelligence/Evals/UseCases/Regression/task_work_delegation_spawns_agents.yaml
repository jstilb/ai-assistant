# Task: Work Delegation Spawns Agents
# When /work start fires with items in queue, agents must be spawned for delegation

id: task_work_delegation_spawns_agents
description: "When processing work items, the orchestrator must delegate to Task agents instead of processing inline"
type: regression
domain: orchestration
source: bug_fix

graders:
  - type: tool_calls
    weight: 0.40
    required: true
    params:
      required:
        - Bash  # For init, next-batch, prepare, capability-router, started
        - Task  # For agent delegation
      forbidden:
        - Edit  # Orchestrator must NOT edit implementation files
        - Write # Orchestrator must NOT write implementation files

  - type: llm_rubric
    weight: 0.35
    params:
      rubric: |
        Evaluate if the agent follows the orchestration pattern:
        1. Did the agent call ExecutiveOrchestrator.ts init?
        2. Did the agent call ExecutiveOrchestrator.ts next-batch?
        3. Did the agent call ItemOrchestrator.ts prepare for items?
        4. Did the agent call CapabilityRouter.ts for ISC rows?
        5. Did the agent spawn Task() agents for non-TRIVIAL rows?
        6. Did the agent avoid writing implementation code itself?

        Score 5 if full orchestration pattern followed with delegation
        Score 3 if some delegation but also some inline processing
        Score 1 if work was processed inline without delegation
      reasoning_first: true
      scale: "1-5"

  - type: natural_language_assert
    weight: 0.25
    params:
      assertions:
        - "At least one Task() agent was spawned for work delegation"
        - "The orchestrator did not write implementation code directly"
        - "ExecutiveOrchestrator init and next-batch were called"

trials: 3
pass_threshold: 0.75

tags:
  - delegation
  - orchestration
  - autonomous_work
  - regression

created_at: "2026-02-13"
