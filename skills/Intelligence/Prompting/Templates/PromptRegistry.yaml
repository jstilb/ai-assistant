# ==========================================================================
# Registry Metadata
# ==========================================================================

categories:
  hooks:
    description: "Prompts used by lifecycle event handlers"
    prompts: [sentiment_analysis, tab_title]
  agents:
    description: "Prompts for agent context and orchestration"
    prompts: [agent_context, orchestration, briefing, roster, voice]
  research:
    description: "Prompts for research workflows"
    prompts: [query_decomposition, synthesis]
  evals:
    description: "Prompts for evaluation and testing"
    prompts: [judge, rubric, testcase, comparison, report]
  structure:
    description: "Structural and formatting prompts"
    prompts: [structure, gate, reasoning, tone, format]

model_hints:
  fast: "Use Haiku - quick, cheap operations (sentiment, classification)"
  standard: "Use Sonnet - balanced quality/speed (summaries, generation)"
  smart: "Use Opus - complex reasoning (synthesis, judging)"
  null: "Static rendering - no inference needed"
