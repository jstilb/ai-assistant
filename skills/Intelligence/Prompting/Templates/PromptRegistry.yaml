# PromptRegistry.yaml
# Central prompt inventory for Kaya Prompting Skill
#
# Purpose:
# - Single source of truth for all managed prompts
# - Maps registry IDs to template files
# - Tracks versions, usage, and model hints
# - Enables prompt discovery and audit
#
# Key Differentiation from Fabric:
# - Fabric: Pattern Library (Consumption) - Apply 239 pre-built patterns to content
# - Prompting: Template System (Creation) - Generate prompts from templates + data
#
# Usage:
# - PromptLoader.ts uses this registry to resolve prompt IDs
# - PromptAudit.ts validates all registered prompts against Standards.md
# - hooks/ and skills/ reference prompts by registry ID

version: "1.0.0"
last_updated: "2026-02-01"

prompts:
  # ==========================================================================
  # Hook Prompts - Used by lifecycle event handlers
  # ==========================================================================

  sentiment_analysis:
    template: Hooks/SentimentAnalysis.hbs
    version: "1.0.0"
    description: "Detect emotional sentiment in user messages for implicit rating capture"
    used_by:
      - "hooks/ImplicitSentimentCapture.hook.ts"
    model_hint: fast  # Haiku - quick sentiment detection
    required_data:
      - principal.name
      - assistant.name
    output_format: json

  tab_title:
    template: Hooks/TabTitleGeneration.hbs
    version: "1.0.0"
    description: "Generate 3-5 word gerund summaries for terminal tab titles"
    used_by:
      - "hooks/UpdateTabTitle.hook.ts"
    model_hint: standard  # Sonnet - better characterization
    required_data: []
    output_format: text

  # ==========================================================================
  # Agent Prompts - Used for agent context and orchestration
  # ==========================================================================

  agent_context:
    template: Agents/AgentContext.hbs
    version: "1.0.0"
    description: "Generate unified agent context for spawning specialized agents"
    used_by:
      - "skills/CORE/Tools/AgentOrchestrator.ts"
      - "skills/Agents/Tools/AgentFactory.ts"
    model_hint: standard
    required_data:
      - agent.id
      - agent.name
      - agent.personality
      - task.description
    output_format: text

  orchestration:
    template: Agents/Orchestration.hbs
    version: "1.0.0"
    description: "Aggregation prompts for multi-agent output synthesis"
    used_by:
      - "skills/CORE/Tools/AgentOrchestrator.ts"
    model_hint: standard
    required_data:
      - agents
      - outputs
      - synthesis_mode
    output_format: text

  # ==========================================================================
  # Research Prompts - Used for query decomposition and synthesis
  # ==========================================================================

  query_decomposition:
    template: Research/QueryDecomposition.hbs
    version: "1.0.0"
    description: "Decompose complex research queries into parallel search strategies"
    used_by:
      - "skills/Research/Tools/QueryPlanner.ts"
    model_hint: standard
    required_data:
      - query
      - domain_hints
    output_format: json

  synthesis:
    template: Research/Synthesis.hbs
    version: "1.0.0"
    description: "Synthesize findings from multiple research sources"
    used_by:
      - "skills/Research/Tools/Synthesizer.ts"
    model_hint: smart  # Opus - complex reasoning
    required_data:
      - sources
      - original_query
    output_format: text

  # ==========================================================================
