  judge:
    template: Evals/Judge.hbs
    version: "1.0.0"
    description: "LLM-as-Judge evaluation prompts"
    used_by:
      - "skills/Evals/Graders/ModelBased/LLMRubric.ts"
    model_hint: smart  # Opus for judge quality
    required_data:
      - criteria
